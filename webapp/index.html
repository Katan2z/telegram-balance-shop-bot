<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Balance Shop</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="label">Telegram Mini App</p>
        <h1>Магазин и баланс</h1>
        <p id="userName" class="muted">Загрузка пользователя...</p>
      </div>
      <div class="balance-card">
        <span>Баланс</span>
        <strong id="balance">0</strong>
      </div>
    </section>

    <section class="grid">
      <article class="card">
        <h2>🏆 Топ-3 за месяц</h2>
        <div id="topMonth" class="list"></div>
      </article>

      <article class="card">
        <h2>📊 Моя статистика</h2>
        <div id="myStats" class="list"></div>
      </article>
    </section>

    <section class="card">
      <h2>🛒 Магазин</h2>
      <div id="products" class="products"></div>
    </section>

    <section class="card admin-only hidden" id="adminBlock">
      <h2>👑 Админ-статистика</h2>
      <div id="adminStats" class="list"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
