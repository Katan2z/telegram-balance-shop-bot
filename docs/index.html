<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Спасибки</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="closing.css" />
  <link rel="stylesheet" href="admin-tasks.css" />
  <link rel="stylesheet" href="shop.css" />
  <link rel="stylesheet" href="instructor.css?v=klokr-sheet-2" />
  <link rel="stylesheet" href="navigation.css" />
  <link rel="stylesheet" href="visual-polish.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div class="hero-copy">
        <p class="label">Командная мотивация</p>
        <h1><span>Мои</span> Спасибки</h1>
        <p id="userName" class="muted">Загрузка...</p>
        <div class="hero-badges">
          <span>🔥 скорость</span>
          <span>👑 качество</span>
        </div>
      </div>
      <div class="balance-card">
        <div class="spasibki-balance">
          <span>Баланс</span>
          <strong id="balance">0</strong>
          <small>спасибок</small>
        </div>
        <div class="coins-chip">
          <i>🪙</i>
          <span>Монетки</span>
          <strong id="coinsBalance">0</strong>
        </div>
      </div>
    </section>

    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="home">Главная</button>
      <button class="tab" data-tab="rating">Рейтинг</button>
    </nav>

    <section class="tab-page active" id="tab-home">
      <div class="grid">
        <article class="card stats-card">
          <h2>📊 Моя статистика</h2>
          <div id="myStats" class="list"></div>
        </article>
        <article class="card trophy-card">
          <h2>🏆 Герой месяца</h2>
          <div id="heroMonth" class="list"></div>
        </article>
        <article class="card klokr-home-card">
          <h2>🧑‍🏫 Лучшие КЛОКР</h2>
          <div id="klokrTopHome" class="list"></div>
        </article>
      </div>
    </section>

    <section class="tab-page" id="tab-rating">
      <article class="card rating-card">
        <h2>🏆 Топ-3</h2>
        <div id="topMonth" class="list"></div>
      </article>
    </section>

    <section class="tab-page" id="tab-admin">
      <article class="card admin-panel">
        <h2>👑 Управление</h2>
        <div class="admin-form">
          <label>Сотрудник</label>
          <select id="adminUser"></select>
          <label>Сумма</label>
          <input id="adminAmount" type="number" min="1" step="1" placeholder="Например 10" />
          <div class="admin-actions">
            <button id="adminAdd" class="action-btn add">+ Начислить</button>
            <button id="adminRemove" class="action-btn remove">− Списать</button>
            <button id="adminRemoveCoins" class="action-btn remove">− Монетки</button>
          </div>
          <p id="adminStatus" class="admin-status"></p>
        </div>
      </article>
    </section>

    <section class="tab-page" id="tab-managers">
      <article class="card managers-panel">
        <h2>👑 Менеджеры</h2>
        <div class="admin-form">
          <label>Сотрудник</label>
          <select id="managerUser"></select>
          <div class="admin-actions">
            <button id="managerAdd" class="action-btn add">+ Дать админку</button>
            <button id="managerRemove" class="action-btn remove">− Забрать</button>
          </div>
          <p id="managerStatus" class="admin-status"></p>
        </div>
        <div id="managersList" class="list managers-list"></div>
      </article>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js?v=klokr-roles-2"></script>
  <script src="shop.js"></script>
  <script src="instructor.js?v=klokr-sheet-2"></script>
  <script src="storage-times.js"></script>
  <script src="storage-calculator.js"></script>
  <script src="closing-data.js"></script>
  <script src="closing.js"></script>
  <script src="admin-tasks.js"></script>
  <script src="navigation.js"></script>
  <script src="nav-access.js"></script>
</body>
</html>
